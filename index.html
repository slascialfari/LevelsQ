<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
    <link rel="stylesheet" href="styles/main.css" />

    <style>
      /* Default widget styling (temporary) */
      #radioWidget {
        position: fixed; /* we’ll place it with JS relative to the canvas on screen */
        top: 0;
        left: 0;

        width: 220px;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        padding: 10px 10px 8px;
        font: 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;

        display: none;
        user-select: none;
        pointer-events: none;

        z-index: 9999;
      }

      #radioWidget .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 6px;
      }
      #radioWidget .title {
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      #radioWidget .hint {
        opacity: 0.85;
        font-size: 11px;
      }
      #radioWidget .station {
        font-size: 12px;
        opacity: 0.95;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #radioWidget .status {
        font-size: 11px;
        opacity: 0.8;
      }
    </style>
  </head>

  <body>
    <canvas id="game" width="1280" height="720" aria-label="LevelQ canvas"></canvas>

    <!-- Default widget; you’ll replace later -->
    <div id="radioWidget" aria-label="Radio widget">
      <div class="row">
        <div class="title">RADIO</div>
        <div class="hint">Q / W</div>
      </div>
      <div class="station" id="radioStationName">—</div>
      <div class="status" id="radioStatus">Loading…</div>
    </div>

    <!-- Rotate-to-landscape prompt (mobile portrait only) -->
    <div id="rotate-overlay">
      <div class="rotate-phone"></div>
      <p>Rotate your device to play</p>
    </div>

    <!-- Mobile tap-to-start button (HOME phase 0 only) -->
    <div id="mobile-enter-btn">Tap here to go for a walk</div>

    <!-- Mobile radio button (top-left of canvas, mobile only) -->
    <button id="radioMobileBtn" aria-label="Next radio station">♫</button>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
